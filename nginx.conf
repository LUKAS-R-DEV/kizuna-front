server {
    listen 80;

    # Resolve Docker service names on each request (avoids 502 after container recreate)
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Keycloak (password-setup emails, login) — same host as the app (port 80)
    location /realms/ {
        set $keycloak_upstream http://kizuna-keycloak:8080;
        rewrite ^/realms/(.*) /realms/$1 break;
        proxy_pass $keycloak_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /resources/ {
        set $keycloak_upstream http://kizuna-keycloak:8080;
        rewrite ^/resources/(.*) /resources/$1 break;
        proxy_pass $keycloak_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Direct to services (stable Docker DNS — avoids Eureka ghost instances on gateway)
    location /api-core/ {
        set $core_upstream http://kizuna-core-service:8082;
        rewrite ^/api-core/(.*) /core/$1 break;
        proxy_pass $core_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api-data/ {
        set $data_upstream http://kizuna-data-service:8085;
        rewrite ^/api-data/(.*) /data/$1 break;
        proxy_pass $data_upstream;
        proxy_http_version 1.1;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Host $host;
    }

    location /api-ai/actuator/ {
        set $ai_upstream http://kizuna-ai-service:8090;
        rewrite ^/api-ai/actuator/(.*) /actuator/$1 break;
        proxy_pass $ai_upstream;
        proxy_http_version 1.1;
    }

    location /api-ai/ {
        set $ai_upstream http://kizuna-ai-service:8090;
        rewrite ^/api-ai/(.*) /ai/$1 break;
        proxy_pass $ai_upstream;
        proxy_http_version 1.1;
    }

    location /api-iam/ {
        set $iam_upstream http://kizuna-iam-service:8083;
        rewrite ^/api-iam/(.*) /$1 break;
        proxy_pass $iam_upstream;
        proxy_http_version 1.1;
    }

    location /api-audit/ {
        set $audit_upstream http://kizuna-audit-service:8087;
        rewrite ^/api-audit/(.*) /$1 break;
        proxy_pass $audit_upstream;
        proxy_http_version 1.1;
    }

    location /api-notification/ {
        set $notification_upstream http://kizuna-notification-service:8086;
        rewrite ^/api-notification/(.*) /ntf/$1 break;
        proxy_pass $notification_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
